openapi: 3.0.0
info:
  title: No Frame Works API
  version: '1.0'
  description: API spec for the no-frame-works backend
  contact:
    name: noueii
servers:
  - url: http://localhost:8110
paths:
  /users:
    post:
      operationId: create-user
      summary: Create User
      description: Creates a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'
  /users/{id}:
    get:
      operationId: get-user
      summary: Get User
      description: Gets a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
  /posts:
    post:
      operationId: create-post
      summary: Create Post
      description: Creates a new post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'
  /posts/{id}:
    get:
      operationId: get-post
      summary: Get Post
      description: Gets a post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Post found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
  /posts/by-author/{authorId}:
    get:
      operationId: list-posts-by-author
      summary: List Posts by Author
      description: Lists all posts by a given author
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Posts found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '500':
          $ref: '#/components/responses/Error500'
components:
  schemas:
    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
      required:
        - name
        - email
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
      required:
        - id
        - name
        - email
    CreatePostRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        authorId:
          type: string
          format: uuid
      required:
        - title
        - content
        - authorId
    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        authorId:
          type: string
          format: uuid
        authorName:
          type: string
      required:
        - id
        - title
        - content
        - authorId
        - authorName
  responses:
    Error400:
      description: Bad Request error
      content:
        application/json:
          schema:
            type: object
            properties:
              errorCode:
                type: string
              errorMessage:
                type: string
              data:
                type: object
                nullable: true
            required:
              - errorCode
              - errorMessage
              - data
    Error500:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              errorCode:
                type: string
              errorMessage:
                type: string
              data:
                type: object
                nullable: true
            required:
              - errorCode
              - errorMessage
              - data
    Error404:
      description: Not found error
      content:
        application/json:
          schema:
            type: object
            properties:
              errorCode:
                type: string
              errorMessage:
                type: string
              data:
                type: object
                nullable: true
            required:
              - errorCode
              - errorMessage
              - data
