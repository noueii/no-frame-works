openapi: 3.0.0
info:
  title: No Frame Works API
  version: '1.0'
  description: API spec for no-frame-works backend
servers:
  - url: http://localhost:8110
paths:
  /auth/login:
    post:
      operationId: post-auth-login
      summary: Login
      description: Authenticate with email and password
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'

  /auth/register:
    post:
      operationId: post-auth-register
      summary: Register
      description: Create a new account
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/Error'

  /auth/logout:
    post:
      operationId: post-auth-logout
      summary: Logout
      description: Destroy current session
      tags:
        - auth
      responses:
        '204':
          description: Logout successful

  /users:
    post:
      operationId: post-create-user
      summary: Create User
      description: Create a new user
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'

  /users/{id}:
    get:
      operationId: get-user
      summary: Get User
      description: Get a user by ID
      tags:
        - users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/Error'

  /posts:
    post:
      operationId: post-create-post
      summary: Create Post
      description: Create a new post
      tags:
        - posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/Error'

  /posts/{id}:
    get:
      operationId: get-post
      summary: Get Post
      description: Get a post by ID
      tags:
        - posts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Post found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/Error'

  /posts/by-author/{authorId}:
    get:
      operationId: get-posts-by-author
      summary: List Posts by Author
      description: List all posts by a given author
      tags:
        - posts
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Posts found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'

components:
  schemas:
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
      required:
        - email
        - password

    SessionResponse:
      type: object
      properties:
        sessionToken:
          type: string
      required:
        - sessionToken

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
      required:
        - name
        - email

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
      required:
        - id
        - name
        - email

    CreatePostRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        authorId:
          type: string
          format: uuid
      required:
        - title
        - content
        - authorId

    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        authorId:
          type: string
          format: uuid
        authorName:
          type: string
      required:
        - id
        - title
        - content
        - authorId
        - authorName

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            required:
              - error
